<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: system-ui; }
  .cols { display: flex; gap: 48px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .col-label { color: rgba(255,255,255,0.25); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  .row { display: flex; gap: 16px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { padding: 20px; border: 1px solid rgba(255,255,255,0.12); border-radius: 18px; background: rgba(255,255,255,0.04); color: #fff; cursor: pointer; transition: background 0.2s, border-color 0.2s; }
  .box:hover { background: rgba(240,184,208,0.12); border-color: rgba(240,184,208,0.5); }
  .label { color: rgba(255,255,255,0.4); font-size: 11px; text-align: center; }
  .divider { width: 1px; background: rgba(255,255,255,0.06); }
</style>
</head>
<body>
<div class="cols">

  <!-- BILLBOARD VARIANTS -->
  <div class="col">
    <div class="col-label">Billboard</div>
    <div class="row">

      <div class="item">
        <div class="box">
          <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="18" height="11" rx="1.5"/>
            <line x1="11" y1="14" x2="11" y2="21"/>
            <line x1="7" y1="21" x2="15" y2="21"/>
          </svg>
        </div>
        <span class="label">A — clean</span>
      </div>

      <div class="item">
        <div class="box">
          <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="18" height="11" rx="1.5"/>
            <line x1="11" y1="14" x2="11" y2="21"/>
            <line x1="7" y1="21" x2="15" y2="21"/>
            <line x1="6" y1="7.5" x2="14" y2="7.5"/>
            <line x1="6" y1="10" x2="11" y2="10"/>
          </svg>
        </div>
        <span class="label">B — with copy</span>
      </div>

      <div class="item">
        <div class="box">
          <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="2" width="20" height="13" rx="2"/>
            <line x1="11" y1="15" x2="11" y2="22"/>
            <line x1="6" y1="22" x2="16" y2="22"/>
            <path d="M22 6h1m0 4h-1"/>
          </svg>
        </div>
        <span class="label">C — roadside</span>
      </div>

    </div>
  </div>

  <div class="divider"></div>

  <!-- BROADCAST VARIANTS -->
  <div class="col">
    <div class="col-label">Broadcast</div>
    <div class="row">

      <div class="item">
        <div class="box">
          <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="10" x2="12" y2="21"/>
            <path d="M8.5 7.5a5 5 0 0 0 0 7"/>
            <path d="M15.5 7.5a5 5 0 0 1 0 7"/>
            <path d="M5 4.5a10 10 0 0 0 0 13"/>
            <path d="M19 4.5a10 10 0 0 1 0 13"/>
            <circle cx="12" cy="9" r="1.5" fill="currentColor" stroke="none"/>
          </svg>
        </div>
        <span class="label">A — tower</span>
      </div>

      <div class="item">
        <div class="box">
          <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="2"/>
            <path d="M8.5 8.5a5 5 0 0 0 0 7.1"/>
            <path d="M15.5 8.5a5 5 0 0 1 0 7.1"/>
            <path d="M5.5 5.5a9 9 0 0 0 0 12.7"/>
            <path d="M18.5 5.5a9 9 0 0 1 0 12.7"/>
          </svg>
        </div>
        <span class="label">B — signal rings</span>
      </div>

      <div class="item">
        <div class="box">
          <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
            <path d="M18 8.5a5 5 0 0 1 0 7"/>
            <path d="M21 5.5a9 9 0 0 1 0 13"/>
          </svg>
        </div>
        <span class="label">C — pen + signal</span>
      </div>

    </div>
  </div>

</div>
</body>
</html>
