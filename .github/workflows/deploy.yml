name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_ey9PNIL1Wu9nRsg8BGzxF56f
          VERCEL_PROJECT_ID: prj_W76NJlyEJ8gm2D0ALnqFzZD4TSmu
